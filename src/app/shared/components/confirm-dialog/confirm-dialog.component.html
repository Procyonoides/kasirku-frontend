<ng-container *ngIf="show">
  <!-- Backdrop -->
  <div class="confirm-backdrop" (click)="onCancel()"></div>

  <!-- Dialog -->
  <div class="confirm-wrapper">
    <div class="confirm-dialog">

      <!-- Icon -->
      <div class="confirm-icon" [class]="'icon-' + type">
        <i class="bi" [class.bi-trash3]="type === 'danger'"
          [class.bi-exclamation-triangle]="type === 'warning'"
          [class.bi-question-circle]="type === 'primary'"></i>
      </div>

      <!-- Content -->
      <div class="confirm-content">
        <h5 class="confirm-title">{{ title }}</h5>
        <p class="confirm-message">{{ message }}</p>
      </div>

      <!-- Actions -->
      <div class="confirm-actions">
        <button class="btn btn-outline-secondary" (click)="onCancel()">
          {{ cancelText }}
        </button>
        <button class="btn" (click)="onConfirm()"
          [class.btn-danger]="type === 'danger'"
          [class.btn-warning]="type === 'warning'"
          [class.btn-primary]="type === 'primary'">
          {{ confirmText }}
        </button>
      </div>

    </div>
  </div>
</ng-container>
