<div class="container-fluid py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
      <a routerLink="/products" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div>
        <h4 class="fw-bold mb-0" style="color: #1e3a5f">Kelola Kategori</h4>
        <p class="text-muted small mb-0">Total {{ categories.length }} kategori</p>
      </div>
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <i class="bi bi-plus-lg me-2"></i>Tambah Kategori
    </button>
  </div>

  <!-- Loading -->
  <app-loading-spinner *ngIf="isLoading" message="Memuat kategori..."></app-loading-spinner>

  <!-- Grid Kategori -->
  <div *ngIf="!isLoading" class="row g-3">
    <div *ngIf="categories.length === 0" class="col-12 text-center py-5 text-muted">
      <i class="bi bi-tags fs-1 d-block mb-2"></i>
      <p>Belum ada kategori</p>
      <button class="btn btn-primary btn-sm" (click)="openAdd()">Tambah Kategori</button>
    </div>

    <div *ngFor="let cat of categories" class="col-12 col-sm-6 col-md-4 col-xl-3">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body d-flex align-items-center gap-3 p-3">
          <!-- Color indicator -->
          <div class="rounded-circle flex-shrink-0"
            [style.background]="cat.color"
            style="width:40px; height:40px;">
          </div>
          <!-- Info -->
          <div class="flex-grow-1">
            <div class="fw-semibold">{{ cat.name }}</div>
            <div class="small text-muted">{{ cat.color }}</div>
          </div>
          <!-- Actions -->
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" (click)="openEdit(cat)">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteCategory(cat._id, cat.name)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Modal Tambah/Edit -->
<div class="modal-backdrop-custom" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-custom" *ngIf="showModal">
  <div class="modal-custom-dialog">
    <div class="modal-custom-header">
      <h6 class="fw-bold mb-0">
        <i class="bi bi-tags me-2 text-primary"></i>
        {{ modalMode === 'add' ? 'Tambah Kategori' : 'Edit Kategori' }}
      </h6>
      <button class="btn-close-custom" (click)="closeModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="modal-custom-body">
      <div *ngIf="formError" class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-circle me-1"></i>{{ formError }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nama Kategori <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="formName" placeholder="cth: Minuman" />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Warna</label>
        <div class="d-flex align-items-center gap-3">
          <input type="color" class="form-control form-control-color" 
            [(ngModel)]="formColor" style="width:60px; height:40px; cursor:pointer;" />
          <span class="text-muted small">{{ formColor }}</span>
        </div>
      </div>
    </div>
    <div class="modal-custom-footer">
      <button class="btn btn-outline-secondary" (click)="closeModal()">Batal</button>
      <button class="btn btn-primary" (click)="submitForm()" [disabled]="formSubmitting">
        <span *ngIf="formSubmitting" class="spinner-border spinner-border-sm me-1"></span>
        {{ modalMode === 'add' ? 'Tambah' : 'Simpan' }}
      </button>
    </div>
  </div>
</div>

<!-- Tambah di paling bawah -->
<app-confirm-dialog
  [show]="showConfirm"
  [title]="confirmTitle"
  [message]="confirmMessage"
  confirmText="Ya, Hapus"
  type="danger"
  (confirmed)="onConfirmed()"
  (cancelled)="onCancelled()">
</app-confirm-dialog>
