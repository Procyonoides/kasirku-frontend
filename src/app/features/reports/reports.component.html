<div class="container-fluid py-4">

  <!-- Header -->
  <div class="mb-4">
    <div class="mb-1">
      <h4 class="fw-bold mb-1" style="color: #1e3a5f">Laporan</h4>
      <p class="text-muted small mb-0">Analisis penjualan dan keuangan toko</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div class="report-tabs">
      <button class="report-tab" [class.active]="activeTab === 'sales'"
        (click)="switchTab('sales')">
        <i class="bi bi-graph-up me-2"></i>Penjualan
      </button>
      <button class="report-tab" [class.active]="activeTab === 'profit'"
        (click)="switchTab('profit')">
        <i class="bi bi-cash-stack me-2"></i>Laba Rugi
      </button>
      <button class="report-tab" [class.active]="activeTab === 'top-products'"
        (click)="switchTab('top-products')">
        <i class="bi bi-trophy me-2"></i>Produk Terlaris
      </button>
      <button class="report-tab" [class.active]="activeTab === 'cashflow'"
        (click)="switchTab('cashflow')">
        <i class="bi bi-arrow-left-right me-2"></i>Arus Kas
      </button>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-success btn-sm" (click)="exportExcel()" [disabled]="isLoading || isExporting">
        <i class="bi bi-file-earmark-excel me-1"></i>Excel
      </button>
      <button class="btn btn-outline-danger btn-sm" (click)="exportPDF()" [disabled]="isLoading || isExporting">
        <span *ngIf="isExporting" class="spinner-border spinner-border-sm me-1"></span>
        <i *ngIf="!isExporting" class="bi bi-file-earmark-pdf me-1"></i>PDF
      </button>
      <button class="btn btn-outline-secondary btn-sm" (click)="printReport()" [disabled]="isLoading">
        <i class="bi bi-printer me-1"></i>Print
      </button>
    </div>
  </div>

  <!-- Date Filter -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label small fw-semibold text-muted">Dari Tanggal</label>
          <input type="date" class="form-control" [(ngModel)]="dateFrom" />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label small fw-semibold text-muted">Sampai Tanggal</label>
          <input type="date" class="form-control" [(ngModel)]="dateTo" />
        </div>
        <div class="col-12 col-md-4">
          <button class="btn btn-primary w-100" (click)="onFilter()">
            <i class="bi bi-funnel me-2"></i>Tampilkan Laporan
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <app-loading-spinner *ngIf="isLoading" message="Memuat laporan..."></app-loading-spinner>

  <div #reportContent>
    <!-- ── SALES REPORT ── -->
    <div *ngIf="!isLoading && activeTab === 'sales'">
      <app-sales [data]="salesData || []"></app-sales>
    </div>

    <!-- ── PROFIT LOSS ── -->
    <div *ngIf="!isLoading && activeTab === 'profit'">
      <app-profit-loss [data]="profitData"></app-profit-loss>
    </div>

    <!-- ── TOP PRODUCTS ── -->
    <div *ngIf="!isLoading && activeTab === 'top-products'">
      <app-top-products [data]="topProducts"></app-top-products>
    </div>

    <!-- ── CASHFLOW ── -->
    <div *ngIf="!isLoading && activeTab === 'cashflow'">
      <app-cashflow [data]="cashflowData"></app-cashflow>
    </div>
  </div>

</div>
