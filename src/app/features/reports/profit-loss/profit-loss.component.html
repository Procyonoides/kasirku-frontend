<div *ngIf="data">
  <div class="row g-3 mb-4">

    <div class="col-12 col-md-4">
      <div class="report-stat-card stat-green">
        <div class="rsc-label">Total Pendapatan</div>
        <div class="rsc-value">{{ data.revenue | rupiah }}</div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="report-stat-card stat-red">
        <div class="rsc-label">Total HPP</div>
        <div class="rsc-value">{{ data.cogs | rupiah }}</div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="report-stat-card"
        [class.stat-blue]="data.netProfit >= 0"
        [class.stat-red]="data.netProfit < 0">
        <div class="rsc-label">Laba Bersih</div>
        <div class="rsc-value">{{ data.netProfit | rupiah }}</div>
        <div class="rsc-sub">Margin: {{ getProfitMargin() }}%</div>
      </div>
    </div>

  </div>
</div>

<div *ngIf="!data" class="text-center py-5 text-muted">
  <i class="bi bi-bar-chart fs-1 d-block mb-2"></i>
  <p>Belum ada data. Pilih periode dan klik Tampilkan Laporan.</p>
</div>
